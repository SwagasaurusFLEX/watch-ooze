<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watch Ooze</title>
<meta name="description" content="Live readout of the staccana validator-subsidy program. Uptime, delegated stake, votes, and lifetime payouts pulled directly from on-chain state.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ambient world map -->
<div class="map-bg" aria-hidden="true">
  <img class="map-svg" src="/static/world-map.svg" alt="">
  <div class="map-scan"></div>
</div>

<div class="scanlines" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>

<header class="topbar">
  <a href="https://ooze.run" class="logo">OOZE</a>
  <nav>
    <a href="https://ooze.run">FORENSICS</a>
    <a href="https://dashboard.ooze.run">DASHBOARD</a>
    <a href="https://lab.ooze.run">LABS</a>
    <a href="/" class="active">WATCH OOZE</a>
    <a href="https://github.com/SwagasaurusFLEX" target="_blank" rel="noopener">GITHUB</a>
    <a href="https://twitter.com/0ooozzzzeeee" target="_blank" rel="noopener">X</a>
  </nav>
</header>

<main>

  <!-- status strip -->
  <section class="status-strip" id="status-strip">
    <div class="strip-stat">
      <div class="strip-label">REGISTERED</div>
      <div class="strip-value" id="strip-count">—</div>
    </div>
    <div class="strip-stat">
      <div class="strip-label">SLOT</div>
      <div class="strip-value" id="strip-slot">—</div>
    </div>
    <div class="strip-stat">
      <div class="strip-label">EPOCH</div>
      <div class="strip-value" id="strip-epoch">—</div>
    </div>
    <div class="strip-stat">
      <div class="strip-label">TOTAL SUBSIDY PAID</div>
      <div class="strip-value" id="strip-total">—</div>
    </div>
  </section>

  <!-- single panel with all validators in a table -->
  <section class="panel" id="panel">

    <header class="panel-head">
      <div class="panel-title">
        <span class="sync-light" id="sync-light"></span>
        <span class="sync-label" id="sync-label">SYNC</span>
        <span class="panel-divider">::</span>
        <span class="panel-name">VALIDATOR REGISTRY</span>
      </div>
      <div class="panel-meta">
        <span class="meta-item"><span class="dim">NETWORK</span> <span id="net-foot">staccana</span></span>
        <span class="meta-sep">·</span>
        <span class="meta-item"><span class="dim">PROGRAM</span> Subsidy11…1111</span>
        <span class="meta-sep">·</span>
        <span class="meta-item"><span class="dim">RPC</span> <span id="rpc-foot">staccana</span></span>
      </div>
    </header>

    <div class="panel-table-wrap">
      <table class="panel-table">
        <thead>
          <tr>
            <th class="col-validator">VALIDATOR</th>
            <th class="col-uptime">UPTIME</th>
            <th class="col-stake">DELEGATED STAKE</th>
            <th class="col-votes">VOTES</th>
            <th class="col-subsidy">LIFETIME SUBSIDY</th>
            <th class="col-epoch">EPOCH</th>
            <th class="col-nonce">NONCE</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr class="empty-row"><td colspan="7">// loading registry...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="panel-corners" aria-hidden="true">
      <span class="corner corner-tl"></span>
      <span class="corner corner-tr"></span>
      <span class="corner corner-bl"></span>
      <span class="corner corner-br"></span>
    </div>

  </section>

</main>

<footer class="page-footer">
  <span>OOZE.RUN</span>
  <span class="sep">·</span>
  <a href="https://twitter.com/0ooozzzzeeee" target="_blank" rel="noopener">@0ooozzzzeeee</a>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
